variables:
  UBUNTU_TEST_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  UBUNTU_RELEASE_IMAGE: $CI_REGISTRY_IMAGE:ubuntu2204_latest


stages:
  - build-docker
  - deploy-docker
  - test
  - deploy

.mpcdf-modules:
  before_script:
    - module purge
    - module load numdiff/5.9
    - module load cmake/3.24
    - module load git

# Avoids splitting commit and merge pipelines
# Without this, every push to a branch with a merge request creates two pipelines: One for the 
# branch itself, having all build-tests and another for the ones specific to merge requests.
# With this, when a branch is part of a merge request, build-tests are cancelled on the branch but
# run in the merge request pipeline.
.combine-merge-branch-pipelines:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

.mpcdf-gcc-env:
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/module-image
  tags:
    - cloud
  stage: test
  before_script:
    - !reference [.mpcdf-modules,before_script]
    - module load gcc/11
    - module load openmpi/4
    - module list

build-test_gcc_3D:
  extends:
    - .mpcdf-gcc-env
    - .combine-merge-branch-pipelines
  script:
    - cmake -S . -B ./build --preset cpu-release-3D
    - cmake --build ./build -j 20
    - cd build
    - ctest --output-on-failure

build-test_gcc_2D:
  extends:
    - .mpcdf-gcc-env
    - .combine-merge-branch-pipelines
  script:
    - cmake -S . -B ./build --preset cpu-release-2D
    - cmake --build ./build -j 20
    - cd build
    - ctest --output-on-failure

build-test_gcc_1D:
  extends:
    - .mpcdf-gcc-env
    - .combine-merge-branch-pipelines
  script:
    - cmake -S . -B ./build --preset cpu-release-1D
    - cmake --build ./build -j 20
    - cd build
    - ctest --output-on-failure

.mpcdf-gpu-env:
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/module-image
  tags:
    - cloud-gpu
  stage: test
  before_script:
    - !reference [.mpcdf-modules,before_script]
    - module load gcc/11 cuda/11.4
    - module load openmpi/4
    - module list

build-test_gpu_3D:
  extends:
    - .mpcdf-gpu-env
    - .combine-merge-branch-pipelines
  script:
    - nvidia-cuda-mps-control -d
    - export BUILD_DIR=$(pwd)/build
    - cmake -S . -B $BUILD_DIR --preset mpcdf-gpu-3D
    - cmake --build $BUILD_DIR -j 20
    - cd build
    - ctest --output-on-failure
    - echo quit | nvidia-cuda-mps-control

build-test_gpu_2D:
  extends:
    - .mpcdf-gpu-env
    - .combine-merge-branch-pipelines
  script:
    - nvidia-cuda-mps-control -d
    - export BUILD_DIR=$(pwd)/build
    - cmake -S . -B $BUILD_DIR --preset mpcdf-gpu-2D
    - cmake --build $BUILD_DIR -j 20
    - cd build
    - ctest --output-on-failure
    - echo quit | nvidia-cuda-mps-control

build-test_gpu_1D:
  extends:
    - .mpcdf-gpu-env
    - .combine-merge-branch-pipelines
  script:
    - nvidia-cuda-mps-control -d
    - export BUILD_DIR=$(pwd)/build
    - cmake -S . -B $BUILD_DIR --preset mpcdf-gpu-1D
    - cmake --build $BUILD_DIR -j 20
    - cd build
    - ctest --output-on-failure
    - echo quit | nvidia-cuda-mps-control

.mpcdf-clang-env:
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/module-image
  tags:
    - cloud
  stage: test
  before_script:
    - !reference [.mpcdf-modules,before_script]
    - module load gcc/12
    - module load openmpi/4
    - module load clang/15
    - module list

build-test_clang_cpu_3D:
  extends:
    - .mpcdf-clang-env
    - .combine-merge-branch-pipelines
  script:
    - cmake --preset cpu-release-3D -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang -B ./build
    - cmake --build ./build -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure

build-test_clang_cpu_2D:
  extends:
    - .mpcdf-clang-env
    - .combine-merge-branch-pipelines
  script:
    - cmake --preset cpu-release-2D -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang -B ./build
    - cmake --build ./build -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure

build-test_clang_cpu_1D:
  extends:
    - .mpcdf-clang-env
    - .combine-merge-branch-pipelines
  script:
    - cmake --preset cpu-release-1D -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang -B ./build
    - cmake --build ./build -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure



# Build and test directly on the Raven HPC system (A100 GPU, SLES15, environment modules, Slurm)
build-gcc-gpu:
  stage: test
  only:
    - DISABLE
  tags:
    - gpu
  script:
    - cd scripts
    - bash ci_raven_gpu_launcher.sh

