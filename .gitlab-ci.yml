# Test that merge requests are "clean", i.e. with the proper style
style-test_cpu_3D:
  extends: .mpcdf-clang-env
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^master$/
  before_script:
    - !reference [.mpcdf-clang-env,before_script]
    - module load anaconda/3/2021.11
    - module list
  script:
    - cmake --preset cpu-release-3D -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang -B ./build
    - bash scripts/sanitize_code.sh
    - git diff --exit-code
  needs: ["build-test_clang_cpu_3D"] # clang-tidy is only meaningful on code that compiles normally.

style-test_gpu_3D:
  extends: .mpcdf-gpu-env
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^master$/
  before_script:
    - !reference [.mpcdf-gpu-env,before_script]
    - module load clang/15
    - module load anaconda/3/2021.11
    - module list
  script:
    - cmake -S . -B ./build --preset mpcdf-gpu-3D
    - bash scripts/sanitize_code.sh
    - git diff --exit-code
  needs: ["build-test_gpu_3D"] # clang-tidy is only meaningful on code that compiles normally.

# Create and publish documentation pages (Ubuntu 20.04)
pages:
  image: $UBUNTU_RELEASE_IMAGE
  tags:
    - cloud
  stage: deploy
  only:
    - master
  script:
    - cd doc/doxygen
    - doxygen Doxyfile.in
    - cd ../sphinx
    - make latex-conversion
    - make html
    - mv _build/html/ ../../public/
  artifacts:
    paths:
      - public


# --- BELOW
# CI jobs to build and tag the Docker CI image on MPCDF GitLab,
# edit 'scripts/Dockerfile-CI-Ubuntu2204' to trigger a rebuild,
# it should not be necessary to modify the jobs themselves ...
# ---

build-ubuntu-ci-image:
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  stage: build-docker
  tags:
    - cloud
  only:
    refs:
      - master
      - upgrade_ci_image_ubuntu_2204
    changes:
      - scripts/Dockerfile-CI-Ubuntu2204
  script:
    - mkdir -p /kaniko/.docker
    - >-
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
        >/kaniko/.docker/config.json
    - >-
      /kaniko/executor \
        --context $CI_PROJECT_DIR \
        --dockerfile $CI_PROJECT_DIR/scripts/Dockerfile-CI-Ubuntu2204 \
        --destination $UBUNTU_TEST_IMAGE --reproducible -v debug

deploy-ubuntu-ci-image:
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/module-image/podman:latest
  stage: deploy-docker
  tags:
    - cloud
  only:
    refs:
      - master
      - upgrade_ci_image_ubuntu_2204
    changes:
      - scripts/Dockerfile-CI-Ubuntu2204
  variables:
    BUILDAH_FORMAT: docker
    BUILDAH_ISOLATION: chroot
    STORAGE_DRIVER: vfs
  script:
    - podman login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - podman pull $UBUNTU_TEST_IMAGE
    - podman tag  $UBUNTU_TEST_IMAGE $UBUNTU_RELEASE_IMAGE
    - podman push $UBUNTU_RELEASE_IMAGE
