.mpcdf-gpu-env:
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/module-image
  tags:
    - cloud-gpu
  stage: test
  before_script:
    - module purge
    - module load cmake/3.24 git
    - module load gcc/11 cuda/11.4
    - module load openmpi/4 numdiff/5.9
# 3D Build and test based on the MPCDF 'module-image' (GPU, CentOS7, environment modules)
build-test_mpcdf_modules_cloud_gpu_3D:
  extends: .mpcdf-gpu-env
  script:
    - nvidia-cuda-mps-control -d
    - export BUILD_DIR=$(pwd)/build
    - cmake -S . -B $BUILD_DIR --preset mpcdf-gcc-gpu-3D
    - cmake --build $BUILD_DIR -j 20
    - cd build
    - ctest --output-on-failure
    - echo quit | nvidia-cuda-mps-control

# 2D Build and test based on the MPCDF 'module-image' (GPU, CentOS7, environment modules)
build-test_mpcdf_modules_cloud_gpu_2D:
