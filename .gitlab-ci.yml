.mpcdf-clang-env:
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/ci-module-image/gcc_13-openmpi_4_1:latest
  tags:
    - cloud
  stage: test
  before_script:
    - !reference [.mpcdf-modules,before_script]
    - module load gcc/13 # clang/17+ needs gcc/13 libraries to run
    - module load openmpi/4.1
    - module load clang/17 
    - module list

build-test_clang_cpu_3D:
  extends:
    - .mpcdf-clang-env
    - .combine-merge-branch-pipelines
  script:
    - cmake --preset cpu-release-3D -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang -B ./build
    - cmake --build ./build -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure

