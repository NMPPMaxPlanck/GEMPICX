.mpcdf-gpu-env:
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/ci-module-image/gcc_12-openmpi_4_1:latest
  tags:
    - cloud-gpu
  stage: test
  before_script:
    - !reference [.mpcdf-modules,before_script]
    - module load gcc/12
    - module load openmpi/4.1
    - module load cuda/12.2
    - module list

build-test_gpu_3D:
  extends:
    - .mpcdf-gpu-env
    - .combine-merge-branch-pipelines
  script:
    - nvidia-cuda-mps-control -d
    - export BUILD_DIR=$(pwd)/build
    - cmake -S . -B $BUILD_DIR --preset mpcdf-gpu-3D
    - cmake --build $BUILD_DIR -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure
    - echo quit | nvidia-cuda-mps-control

build-test_gpu_2D:
  extends:
    - .mpcdf-gpu-env
    - .combine-merge-branch-pipelines
  script:
    - nvidia-cuda-mps-control -d
    - export BUILD_DIR=$(pwd)/build
    - cmake -S . -B $BUILD_DIR --preset mpcdf-gpu-2D
    - cmake --build $BUILD_DIR -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure
    - echo quit | nvidia-cuda-mps-control

build-test_gpu_1D:
  extends:
    - .mpcdf-gpu-env
    - .combine-merge-branch-pipelines
  script:
    - nvidia-cuda-mps-control -d
    - export BUILD_DIR=$(pwd)/build
    - cmake -S . -B $BUILD_DIR --preset mpcdf-gpu-1D
    - cmake --build $BUILD_DIR -j $(($(nproc)-2))
