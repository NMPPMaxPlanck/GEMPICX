ubuntu2004_openmpi_3D:
  image: gitlab-registry.mpcdf.mpg.de/khr/docker/gempic/ubuntu2004
  script:
    - mkdir build
    - export BUILD_DIR=`readlink -f ./build`
    - cd scripts
    - bash gempic3D_ci.sh
  tags:
    - avx2
    - docker
    

build-gcc-gpu:
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/module-image
  tags:
    - gpu 
  script:
    - cd scripts
    - ./ci_raven_gpu_launcher.sh

pages:
  image: gitlab-registry.mpcdf.mpg.de/khr/docker/gempic/ubuntu2004
  stage: deploy
  before_script:
    - apt-get -y update
    - apt-get -y install python3-pip
    - apt-get -y install doxygen
    - pip3 install -U sphinx
    - pip3 install sphinx_rtd_theme
    - pip3 install breathe
  script:
    - cd doc/sphinx ; make html
    - mv _build/html/ ../../public/
  artifacts:
    paths:
      - public
# if runner offline: login to raven and type tmux; ./bin/gitlab-runner run; ctrl B D 
