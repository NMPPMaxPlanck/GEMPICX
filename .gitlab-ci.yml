ubuntu2004_openmpi_3D:
  image: gitlab-registry.mpcdf.mpg.de/khr/docker/gempic/ubuntu2004
  script:
    - mkdir build
    - export BUILD_DIR=`readlink -f ./build`
    - cd scripts
    - bash gempic3D_ci.sh
  tags:
    - avx2
    - docker
    
image: gitlab-registry.mpcdf.mpg.de/mpcdf/module-image

build-gcc-gpu:
  tags:
    - gpu 
  script:
    - cd scripts
    - ./compile_gpu_raven-gcc.sh
    - module purge
    - module load gcc/10
    - module load cuda/11.2
    - module load cmake/3.22
    - module load openmpi
    - module load numdiff/5.9
    - cd ../build/gempic
    - ctest --output-on-failure
    - exit

# if runner offline: login to raven and type tmux; ./bin/gitlab-runner run; ctrl B D 
