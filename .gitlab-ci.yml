variables:
  UBUNTU_TEST_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  UBUNTU_RELEASE_IMAGE: $CI_REGISTRY_IMAGE:ubuntu2204_latest


stages:
  - build-docker
  - deploy-docker
  - test
  - deploy

# 3D Build and test based on an Ubuntu 20.04 image (CPU only)
build-test_ubuntu2204_3D:
  image: $UBUNTU_RELEASE_IMAGE
  tags:
    - cloud
  stage: test
  script:
    - mkdir build
    - export BUILD_DIR=`readlink -f ./build`
    - cd scripts
    - bash gempic3D_ci.sh

