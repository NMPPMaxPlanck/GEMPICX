# Inputs for e.g. scheduled jobs
spec:
  inputs:
    run_unit_tests:
      default: "default"
      options:
        - "true"
        - "false"
        - "default"
      description: "whether to run unit tests. ''default'' to run unit tests according to default criteria (see .unit-test-setup for details)."
    build_documentation:
      default: "default"
      options:
        - "true"
        - "false"
        - "default"
      description: "whether to build unit tests. ''default'' to build it only on master."
    cleanup_macos:
      default: "false"
      options:
        - "true"
        - "false"
      description: "whether to remove directories on the macos runner that may have been left over from old pipelines."
---
# Global variables make inputs modifiable according to job rules
variables:
  RUN_UNIT_TESTS:
    value: $[[ inputs.run_unit_tests ]]
  BUILD_DOCUMENTATION:
    value: $[[ inputs.build_documentation ]]
  CLEANUP_MACOS:
    value: $[[ inputs.cleanup_macos ]]

default:
  before_script:
    - source scripts/CI_helpers.sh

stages:
  - test
  - deploy

# Interruptible jobs even after stages with non-interruptible jobs
# Avoids splitting commit and merge pipelines, and make jobs interruptible
# Without this, every push to a branch with a merge request creates two pipelines: One for the 
# branch itself, having all build-tests and another for the ones specific to merge requests.
workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    # When part of a merge request pipelines are cancelled on the branch
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - when: always

.mpcdf-modules:
  before_script:
    - export MPCDF_RUNNER=1
    - module purge
    - module load cmake
    - module load git
    - module load python-waterboa

.unit-test-setup:
  rules:
    - if: $RUN_UNIT_TESTS == "true"
    - if: $RUN_UNIT_TESTS == "false"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - Src/**/*
          - Testing/**/*
          - Examples/**/*
        compare_to: $CI_MERGE_REQUEST_DIFF_BASE_SHA
    # When not part of a merge request, check for changes in all files compared to the previous
    # commit, and only run if there are changes. This should even avoid duplicate pipelines on
    # master after merges, running if the code after the merge differs from the feature branch.
    #
    # CI_COMMIT_BEFORE_SHA is all 0 for scheduled pipelines, manually run pipelines, etc.
    # in this case compare_to would get an invalid reference
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BEFORE_SHA !~ /^0+$/
      changes:
        paths:
          - Src/**/*
          - Testing/**/*
          - Examples/**/*
        compare_to: $CI_COMMIT_BEFORE_SHA
  # If another commit is made while the pipeline is running, the current one will be canceled.
  interruptible: true

.mpcdf-gcc-env:
  extends:
    - .unit-test-setup
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/ci-module-image/gcc-openmpi:latest
  tags:
    - cpu
  stage: test
  before_script:
    - !reference [default,before_script]
    - !reference [.mpcdf-modules,before_script]
    - module load gcc
    - module load openmpi
    - module load fftw-mpi
    - module list

build-test_gcc_3D:
  extends:
    - .mpcdf-gcc-env
  script:
    - configure_build_test cpu-release-3D 

build-test_gcc_2D:
  extends:
    - .mpcdf-gcc-env
  script:
    - configure_build_test cpu-release-2D
  needs: ["build-test_gcc_3D"]

build-test_gcc_1D:
  extends:
    - .mpcdf-gcc-env
  script:
    - configure_build_test cpu-release-1D
  needs: ["build-test_gcc_3D"]

.mpcdf-cuda-env:
  extends:
    - .unit-test-setup
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/ci-module-image/gcc-openmpi-cuda:latest
  tags:
    - gpu-nvidia-cc80
  stage: test
  before_script:
    - !reference [default,before_script]
    - !reference [.mpcdf-modules,before_script]
    - module load gcc
    - module load openmpi
    - module load cuda
    - module load fftw-mpi
    - module list
    - export NVIDIA_ARCHITECTURE=A100
    - pip3 install ninja

build-test_cuda_3D:
  extends:
    - .mpcdf-cuda-env
  script:
    - nvidia-cuda-mps-control -d
    - configure_build_test_gpu "mpcdf-cloud-cuda -DAMReX_SPACEDIM=3"
    - echo quit | nvidia-cuda-mps-control
  needs: ["build-test_gcc_3D"]

build-test_cuda_2D:
  extends:
    - .mpcdf-cuda-env
  script:
    - nvidia-cuda-mps-control -d
    - configure_build_test_gpu "mpcdf-cloud-cuda -DAMReX_SPACEDIM=2"
    - echo quit | nvidia-cuda-mps-control
  needs: ["build-test_cuda_3D"]

build-test_cuda_1D:
  extends:
    - .mpcdf-cuda-env
  script:
    - nvidia-cuda-mps-control -d
    - configure_build_test_gpu "mpcdf-cloud-cuda -DAMReX_SPACEDIM=1"
    - echo quit | nvidia-cuda-mps-control
  needs: ["build-test_cuda_2D"]

.mpcdf-clang-env:
  extends:
    - .unit-test-setup
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/ci-module-image/gcc-openmpi:latest
  tags:
    - cpu
  stage: test
  before_script:
    - !reference [default,before_script]
    - !reference [.mpcdf-modules,before_script]
    - module load gcc
    - module load openmpi
    - module load clang 
    - module load fftw-mpi
    - module list

build-test_clang_cpu_3D:
  extends:
    - .mpcdf-clang-env
  script:
    - configure_build_test "cpu-release-3D -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang"
  needs: ["build-test_gcc_3D"]

build-test_clang_cpu_2D:
  extends:
    - .mpcdf-clang-env
  script:
    - configure_build_test "cpu-release-2D -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang"
  needs: ["build-test_gcc_3D"]

build-test_clang_cpu_1D:
  extends:
    - .mpcdf-clang-env
  script:
    - configure_build_test "cpu-release-1D -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang"
  needs: ["build-test_gcc_3D"]

build-test_mac_3D:
  extends:
    - .unit-test-setup
  script:
    - configure_build_test cpu-release-3D
  after_script:
    - rm -rf $_JOB_PATH
  tags: [macos]
  needs: ["build-test_gcc_3D"]
  variables:
    # Job ID changes for each job, so reusing the directory becomes impossible,
    # therefore, the fetch strategy also becomes unusable
    _JOB_PATH: $CI_BUILDS_DIR/$CI_PROJECT_NAME/job-$CI_JOB_ID
    GIT_CLONE_PATH: $_JOB_PATH/$CI_CONCURRENT_PROJECT_ID

# Test that merge requests are "clean", i.e. with the proper style
style-test_cpu_3D:
  image: debian:stable-slim
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^master$/
  before_script:
    - !reference [default,before_script]
    - start_details environment "Setup environment"
    - apt update
    - apt install -y git cmake clang-18 libopenmpi-dev clang-tidy-18 clang-format-18 python3
    - end_details environment
  script:
    - start_details configure "CMake Configure Step"
    - cmake --preset cpu-release-3D -DCMAKE_CXX_COMPILER=clang++-18 -DCMAKE_C_COMPILER=clang-18 -B ./build
    - end_details configure
    - start_details sanitize
    - python3 scripts/sanitize_with_python.py
    - end_details sanitize
    - start_details output
    - cat build/tidyOutput.out
    - end_details output
    - git diff --exit-code
  # needs: ["build-test_clang_cpu_3D"] # clang-tidy is only meaningful on code that compiles normally.

pages:
  image: ubuntu
  tags:
    - cpu
  stage: deploy
  rules:
    - if: $BUILD_DOCUMENTATION == "true"
    - if: $BUILD_DOCUMENTATION == "false"
      when: never
    # We also check Src because doxygen comments could have changed
    - if: $CI_COMMIT_BRANCH == "master" && $CI_COMMIT_BEFORE_SHA !~ /^0+$/
      changes:
        paths:
          - doc/**/*
          - Src/**/*
        compare_to: $CI_COMMIT_BEFORE_SHA
  before_script:
    - !reference [default,before_script]
    - apt-get update
    - apt-get install -y python3 python3.12-venv git cmake 
    - apt-get install -y doxygen
    - apt-get install -y wget curl
    - wget https://github.com/jgm/pandoc/releases/download/3.5/pandoc-3.5-1-amd64.deb
    - dpkg -i pandoc-3.5-1-amd64.deb
    - python3.12 -m venv ./venv
    - source ./venv/bin/activate
    - pip3 install sphinx breathe sphinx_rtd_theme
  script:
    - start_details configure "CMake Configure Step"
    - cmake --preset documentation
    - end_details configure
    - start_details build "CMake Build Step"
    - cmake --build ./build/documentation
    - end_details build
    - mv build/documentation/sphinx/ public/
  needs: []
  artifacts:
    paths:
      - public

cleanup-macos:
  tags: [macos]
  stage: test
  rules:
    - if: $CLEANUP_MACOS == "true"
    - if: $CLEANUP_MACOS == "false"
      when: never
  script:
    - rm -rf $CI_BUILDS_DIR/$CI_PROJECT_NAME/job-*
