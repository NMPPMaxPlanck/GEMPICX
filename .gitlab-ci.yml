# Interruptible jobs even after stages with non-interruptible jobs
workflow:
  auto_cancel:
    on_new_commit: interruptible

stages:
  - test
  - deploy

.mpcdf-modules:
  before_script:
    - module purge
    - module load cmake
    - module load git
    - module load anaconda/3/2023

# Avoids splitting commit and merge pipelines, and make jobs interruptible
# Without this, every push to a branch with a merge request creates two pipelines: One for the 
# branch itself, having all build-tests and another for the ones specific to merge requests.
.remove-duplicate-pipelines:
  rules:
    # When part of a merge request, build-tests are run in the merge request pipeline ...
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # ... but are cancelled on the branch
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # When not part of a merge request, check for changes in all files compared to the previous
    # commit, and only run if there are changes. This should even avoid duplicate pipelines on
    # master after merges, running if the code after the merge differs from the feature branch.
    - if: $CI_COMMIT_BRANCH
      changes:
        paths:
          - "**/*"
        compare_to: $CI_COMMIT_BEFORE_SHA
  # If another commit is made while the pipeline is running, the current one will be canceled.
  interruptible: true

.mpcdf-gcc-env:
  extends:
    - .remove-duplicate-pipelines
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/ci-module-image/gcc-openmpi:latest
  tags:
    - cloud
  stage: test
  before_script:
    - !reference [.mpcdf-modules,before_script]
    - module load gcc
    - module load openmpi
    - module load fftw-mpi
    - module list

build-test_gcc_3D:
  extends:
    - .mpcdf-gcc-env
  script:
    - cmake -S . -B ./build --preset cpu-release-3D
    - cmake --build ./build -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure

build-test_gcc_2D:
  extends:
    - .mpcdf-gcc-env
  script:
    - cmake -S . -B ./build --preset cpu-release-2D
    - cmake --build ./build -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure
  needs: ["build-test_gcc_3D"]

build-test_gcc_1D:
  extends:
    - .mpcdf-gcc-env
  script:
    - cmake -S . -B ./build --preset cpu-release-1D
    - cmake --build ./build -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure
  needs: ["build-test_gcc_3D"]

.mpcdf-gpu-env:
  extends:
    - .remove-duplicate-pipelines
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/ci-module-image/gcc-cuda:latest
  tags:
    - cloud-gpu
  stage: test
  before_script:
    - !reference [.mpcdf-modules,before_script]
    - module load gcc
    - module load openmpi
    - module load cuda
    - module load fftw-mpi
    - module list

build-test_gpu_3D:
  extends:
    - .mpcdf-gpu-env
  script:
    - nvidia-cuda-mps-control -d
    - export BUILD_DIR=$(pwd)/build
    - cmake -S . -B $BUILD_DIR --preset mpcdf-gpu-3D
    - cmake --build $BUILD_DIR -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure
    - echo quit | nvidia-cuda-mps-control
  needs: ["build-test_gcc_3D"]

build-test_gpu_2D:
  extends:
    - .mpcdf-gpu-env
  script:
    - nvidia-cuda-mps-control -d
    - export BUILD_DIR=$(pwd)/build
    - cmake -S . -B $BUILD_DIR --preset mpcdf-gpu-2D
    - cmake --build $BUILD_DIR -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure
    - echo quit | nvidia-cuda-mps-control
  needs: ["build-test_gpu_3D"]

build-test_gpu_1D:
  extends:
    - .mpcdf-gpu-env
  script:
    - nvidia-cuda-mps-control -d
    - export BUILD_DIR=$(pwd)/build
    - cmake -S . -B $BUILD_DIR --preset mpcdf-gpu-1D
    - cmake --build $BUILD_DIR -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure
    - echo quit | nvidia-cuda-mps-control
  needs: ["build-test_gpu_2D"]

.mpcdf-clang-env:
  extends:
    - .remove-duplicate-pipelines
  # N.B. clang/17+ needs gcc/13 libraries to run
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/ci-module-image/gcc-openmpi:latest
  tags:
    - cloud
  stage: test
  before_script:
    - !reference [.mpcdf-modules,before_script]
    - module load gcc
    - module load openmpi
    - module load clang 
    - module load fftw-mpi
    - module list

build-test_clang_cpu_3D:
  extends:
    - .mpcdf-clang-env
  script:
    - cmake --preset cpu-release-3D -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang -B ./build
    - cmake --build ./build -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure
  needs: ["build-test_gcc_3D"]

build-test_clang_cpu_2D:
  extends:
    - .mpcdf-clang-env
  script:
    - cmake --preset cpu-release-2D -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang -B ./build
    - cmake --build ./build -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure
  needs: ["build-test_gcc_3D"]

build-test_clang_cpu_1D:
  extends:
    - .mpcdf-clang-env
  script:
    - cmake --preset cpu-release-1D -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang -B ./build
    - cmake --build ./build -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure
  needs: ["build-test_gcc_3D"]



# Build and test directly on the Raven HPC system (A100 GPU, SLES15, environment modules, Slurm)
build-gcc-gpu:
  stage: test
  only:
    - DISABLE
  tags:
    - gpu
  script:
    - cd scripts
    - bash ci_raven_gpu_launcher.sh

