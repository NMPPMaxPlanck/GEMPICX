build-gcc-gpu:
  stage: build
  tags:
    - gpu 
  script:
    - cd scripts
    - ./compile_mpcdf.sh
  artifacts:
    paths:
      - build
    expire_in: 1 hour
    when: always

# if runner offline: login to raven and type tmux; ./bin/gitlab-runner run; ctrl B D 
test-gcc-gpu:
  stage: test
  tags:
    - gpu 
  script:
    - module purge
    - module load gcc/10
    - module load cuda/11.2
    - module load cmake/3.22
    - module load openmpi
    - cd build/gempic
    - ctest --output-on-failure
    - exit
  needs:
    - job: build-gcc-gpu
      artifacts: true
