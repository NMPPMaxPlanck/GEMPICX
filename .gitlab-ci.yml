# Test that merge requests are "clean", i.e. with the proper style
style-test_cpu_3D:
  extends: .mpcdf-clang-env
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^master$/
  before_script:
    - !reference [.mpcdf-clang-env,before_script]
    - module list
  script:
    - cmake --preset cpu-release-3D -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang -B ./build
    - python3 scripts/sanitize_with_python.py
    - cat build/tidyOutput.out
    - git diff --exit-code
  needs: ["build-test_clang_cpu_3D"] # clang-tidy is only meaningful on code that compiles normally.

style-test_gpu_3D:
  extends: .mpcdf-gpu-env
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^master$/
  before_script:
    - !reference [.mpcdf-gpu-env,before_script]
    - module load clang/17 
    - module list
  script:
    - cmake -S . -B ./build --preset mpcdf-gpu-3D
    - python3 scripts/sanitize_with_python.py
    - cat build/tidyOutput.out
    - git diff --exit-code
  needs: ["build-test_gpu_3D"] # clang-tidy is only meaningful on code that compiles normally.

pages:
  image: ubuntu
  tags:
    - cloud
  stage: deploy
  only:
    - master
  before_script:
    - apt-get update
    - apt-get install -y python3 python3.12-venv git cmake 
    - apt-get install -y doxygen
    - apt-get install -y wget
    - wget https://github.com/jgm/pandoc/releases/download/3.5/pandoc-3.5-1-amd64.deb
    - dpkg -i pandoc-3.5-1-amd64.deb
    - python3.12 -m venv ./venv
    - source ./venv/bin/activate
    - pip3 install sphinx breathe sphinx_rtd_theme
  script:
    - source ./venv/bin/activate
    - cmake -S doc -B ./build
    - cmake --build ./build --target doc
    - mv build/documentation/ public/
  needs: []
  artifacts:
    paths:
      - public
