stages:
  - test
  - deploy

.mpcdf-modules:
  before_script:
    - module purge
    - module load numdiff/5.9
    - module load cmake/3.28
    - module load git
    - module load anaconda/3/2023

.hypre-installation:
  before_script:
    - mkdir -p third_party;pushd third_party
    - git clone https://github.com/hypre-space/hypre.git
    - cd hypre/src
    - ./configure
    - make install
    - popd
    - HYPRE_DIR=/third_party/hypre/src/hypre

# Avoids splitting commit and merge pipelines
# Without this, every push to a branch with a merge request creates two pipelines: One for the 
# branch itself, having all build-tests and another for the ones specific to merge requests.
# With this, when a branch is part of a merge request, build-tests are cancelled on the branch but
# run in the merge request pipeline.
.combine-merge-branch-pipelines:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

.mpcdf-gcc-env:
  image: gitlab-registry.mpcdf.mpg.de/mpcdf/ci-module-image/gcc_12-openmpi_4_1:latest
  tags:
    - cloud
  stage: test
  before_script:
    - !reference [.mpcdf-modules,before_script]
    - module load gcc/12
    - module load openmpi/4.1
    - module list

build-test_gcc_3D:
  extends:
    - .mpcdf-gcc-env
    - .combine-merge-branch-pipelines
  script:
    - cmake -S . -B ./build --preset cpu-release-3D
    - cmake --build ./build -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure

build-test_gcc_2D:
  extends:
    - .mpcdf-gcc-env
    - .combine-merge-branch-pipelines
  script:
    - cmake -S . -B ./build --preset cpu-release-2D
    - cmake --build ./build -j $(($(nproc)-2))
    - cd build
    - ctest --output-on-failure

build-test_gcc_1D:
